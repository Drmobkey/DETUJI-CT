version: '3.8'

services:
  # 1. LAYANAN BACKEND (Flask + Gunicorn + TensorFlow API)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: detuji_backend
    restart: always
    ports:
      - "5004:5004"
    volumes:
      - ./uploads:/app/uploads
      - ./model_storage:/app/model_storage
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
    networks:
      - detuji_network

  # 2. LAYANAN FRONTEND (Next.js Dashboard)
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: detuji_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5004
    depends_on:
      - backend
    networks:
      - detuji_network

# 3. JARINGAN ISOLASI DOCKER
networks:
  detuji_network:
    driver: bridge